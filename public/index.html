.monitoring-banner {
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #06b6d4 100%);
    color: white;
    padding: 20px 24px;
    border-radius: 12px;
    margin: 20px 0 30px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
    box-shadow: 0 10px 40px rgba(99, 102, 241, 0.3);
    position: relative;
    overflow: hidden;
}
.monitoring-banner::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -10%;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
    animation: pulse 4s ease-in-out infinite;
}
@keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.1); opacity: 0.8; }
}
.monitoring-banner-content { flex: 1; min-width: 280px; position: relative; z-index: 1; }
.monitoring-banner-badge {
    display: inline-block;
    background: rgba(255,255,255,0.2);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
}
.monitoring-banner h3 { margin: 0 0 8px 0; font-size: 1.4rem; font-weight: 700; }
.monitoring-banner p { margin: 0; opacity: 0.95; font-size: 0.95rem; line-height: 1.5; }
.monitoring-banner-cta { display: flex; gap: 12px; flex-shrink: 0; position: relative; z-index: 1; }
.monitoring-banner-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 14px;
    text-decoration: none;
    transition: all 0.3s ease;
    white-space: nowrap;
}
.monitoring-banner-btn-primary {
    background: white;
    color: #6366f1;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}
.monitoring-banner-btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
.monitoring-banner-btn-secondary {
    background: rgba(255,255,255,0.15);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
}
.monitoring-banner-btn-secondary:hover { background: rgba(255,255,255,0.25); }
.monitoring-banner-price { font-size: 12px; opacity: 0.9; margin-top: 4px; }
.monitoring-floating {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
    color: white;
    padding: 16px 20px;
    border-radius: 16px;
    box-shadow: 0 10px 40px rgba(99, 102, 241, 0.4);
    max-width: 300px;
    z-index: 1000;
    animation: slideIn 0.5s ease-out;
}
@keyframes slideIn {
    from { transform: translateY(100px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}
.monitoring-floating-close {
    position: absolute;
    top: 8px;
    right: 12px;
    background: none;
    border: none;
    color: white;
    opacity: 0.6;
    cursor: pointer;
    font-size: 18px;
}
.monitoring-floating-close:hover { opacity: 1; }
.monitoring-floating h4 { margin: 0 0 8px 0; font-size: 15px; font-weight: 700; padding-right: 20px; }
.monitoring-floating p { margin: 0 0 12px 0; font-size: 12px; opacity: 0.95; line-height: 1.5; }
.monitoring-floating-btn {
    display: inline-block;
    background: white;
    color: #6366f1;
    padding: 10px 20px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 13px;
    text-decoration: none;
    text-align: center;
    transition: all 0.3s ease;
}
.monitoring-floating-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
@media (max-width: 768px) {
    .monitoring-banner { flex-direction: column; text-align: center; padding: 24px; }

    .monitoring-banner-btn { width: 100%; justify-content: center; }
    .monitoring-floating { left: 10px; right: 10px; bottom: 10px; max-width: none; }
}

<script>
    let menu = document.getElementById('menu');
    if (menu) {
        
        const scrollPosition = localStorage.getItem("menu-scroll-position");
        if (scrollPosition) {
            menu.scrollLeft = parseInt(scrollPosition, 10);
        }
        
        menu.onscroll = function () {
            localStorage.setItem("menu-scroll-position", menu.scrollLeft);
        }
    }

    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener("click", function (e) {
            e.preventDefault();
            var id = this.getAttribute("href").substr(1);
            if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView({
                    behavior: "smooth"
                });
            } else {
                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView();
            }
            if (id === "top") {
                history.replaceState(null, null, " ");
            } else {
                history.pushState(null, null, `#${id}`);
            }
        });
    });

</script>
<script>
    var mybutton = document.getElementById("top-link");
    window.onscroll = function () {
        if (document.body.scrollTop > 800 || document.documentElement.scrollTop > 800) {
            mybutton.style.visibility = "visible";
            mybutton.style.opacity = "1";
        } else {
            mybutton.style.visibility = "hidden";
            mybutton.style.opacity = "0";
        }
    };

</script>
<script>
    document.getElementById("theme-toggle").addEventListener("click", () => {
        const html = document.querySelector("html");
        if (html.dataset.theme === "dark") {
            html.dataset.theme = 'light';
            localStorage.setItem("pref-theme", 'light');
        } else {
            html.dataset.theme = 'dark';
            localStorage.setItem("pref-theme", 'dark');
        }
    })

</script>

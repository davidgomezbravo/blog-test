baseURL: 'https://blog.itsdavidg.co'
languageCode: 'en-us'
title: 'David Gomez - Technology & Business Insights'
theme: 'PaperMod'

params:
  author: 'David Gomez'
  description: 'Expert insights on cybersecurity, cloud solutions, automation, and business growth strategies.'
  keywords: ['Technology', 'Cybersecurity', 'Cloud', 'Automation', 'Business']
  
  # PaperMod settings
  defaultTheme: auto
  disableThemeToggle: false
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false
  
  # Profile mode with background image
  profileMode:
    enabled: true
    title: 'David Gomez'
    subtitle: 'Technology Consultant | Cybersecurity Expert | Cloud Solutions Architect'
    imageUrl: ''
    imageWidth: 120
    imageHeight: 120
    imageTitle: 'David Gomez'
    buttons:
      - name: 'Latest Posts'
        url: '/posts'
      - name: 'About'
        url: 'https://itsdavidg.co/about'
  
  # Social icons
  socialIcons:
    - name: 'linkedin'
      url: 'https://www.linkedin.com/in/david-gomez-bravo/'
    - name: 'twitter'
      url: 'https://x.com/davidgomezbrav1?s=21&t=Cb3rTz9iFpsnkUZZ-7eK0g'
    - name: 'instagram'
      url: 'https://www.instagram.com/itsdavidgco?igsh=MWV5aGhnOHA3eWZiMw%3D%3D&utm_source=qr'
    - name: 'email'
      url: 'https://calendly.com/contactme-itsdavidg/30min'

  # Search
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

# Menu
menu:
  main:
    - identifier: 'posts'
      name: 'Posts'
      url: '/posts/'
      weight: 10
    - identifier: 'categories'
      name: 'Categories'
      url: '/categories/'
      weight: 20
    - identifier: 'tags'
      name: 'Tags'
      url: '/tags/'
      weight: 30
    - identifier: 'about'
      name: 'About'
      url: 'https://itsdavidg.co/about'
      weight: 40

# Taxonomies
taxonomies:
  category: categories
  tag: tags

# Output
outputs:
  home:
    - HTML
    - RSS
    - JSON

# Markup
markup:
  goldmark:
    renderer:
      unsafe: true
    extensions:
      typographer: true
  highlight:
    style: github
    lineNos: true
    codeFences: true
    guessSyntax: true
    noClasses: false
